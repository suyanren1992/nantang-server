<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<title>大地书房 · 住宿管理 · 南塘云村</title>
<style>
:root{--gp:#3d6b52;--ga:#c8892e;--rd:#b84c38;--tx:#1d2e24;--t2:#5a6e5c;--t3:#8a8a8a;--bg:#e8ede6;--bd:#d0d9ce;--wh:#fff;--rs:8px;--rm:12px;--rl:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:system-ui,-apple-system,'Noto Sans SC',sans-serif;height:100%;overflow:hidden;background:#1d2e24;font-size:16px;user-select:none;-webkit-user-select:none}
.app{max-width:430px;margin:0 auto;height:100%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top,0px));background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0}
.topbar-title{font-weight:700;font-size:.85rem;color:var(--tx);flex:1}
.body-scroll{flex:1;overflow-y:auto;padding:0 14px 80px;-webkit-overflow-scrolling:touch}

/* room card */
.room-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--rm);margin-bottom:8px;overflow:hidden}
.room-card:active{transform:scale(.99)}
.room-head{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer}
.room-icon{font-size:1.5rem;flex-shrink:0;width:36px;text-align:center}
.room-info{flex:1;min-width:0}
.room-name{font-weight:700;font-size:.75rem;color:var(--tx)}
.room-type{font-size:.58rem;color:var(--t3);margin-top:2px}
.room-status{flex-shrink:0;text-align:right}
.room-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-bottom:2px}
.room-dot.free{background:var(--gp)}.room-dot.occ{background:var(--rd)}.room-dot.dirty{background:var(--ga)}
.room-tag{display:block;font-size:.55rem;font-weight:600}
.room-tag.av{color:var(--gp)}.room-tag.oc{color:var(--rd)}.room-tag.di{color:var(--ga)}
.room-tenant{font-size:.58rem;font-weight:600;color:var(--t2);margin-top:2px}
.room-tenant.occ{color:var(--rd)}

/* sheet */
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet-card{width:100%;max-width:430px;background:var(--wh);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px 24px;max-height:85vh;overflow-y:auto;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sheet-title{font-size:.82rem;font-weight:700;color:var(--tx);flex:1}
.sheet-close{font-size:1.1rem;cursor:pointer;color:var(--t3);background:none;border:none;padding:4px 8px}
.sheet-info{background:#f8faf8;border-radius:var(--rs);padding:10px 12px;margin-bottom:12px;font-size:.65rem;color:var(--t2);line-height:1.6}
.sheet-info strong{color:var(--tx)}
.sheet-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.sheet-row label{font-size:.62rem;font-weight:600;color:var(--t2);flex-shrink:0;min-width:48px}
.sheet-row input,.sheet-row select{flex:1;padding:9px 10px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.73rem;font-family:inherit;background:var(--wh)}
.sheet-row input:focus,.sheet-row select:focus{outline:none;border-color:var(--gp)}
.sheet-row .val{font-weight:700;color:var(--gp);font-size:.8rem}
.sheet-reminder{background:#fffdf5;border:1px dashed var(--ga);border-radius:var(--rs);padding:10px 12px;margin-bottom:12px;font-size:.62rem;color:#8a6a30;line-height:1.6}
.sheet-check{margin-bottom:6px}
.sheet-check label{display:flex;align-items:center;gap:6px;font-size:.62rem;color:var(--t2);cursor:pointer;padding:6px 0}
.sheet-check input[type=checkbox]{accent-color:var(--gp);width:17px;height:17px}
.sheet-actions{display:flex;gap:8px;margin-top:14px}
.sheet-actions button{flex:1;padding:12px;border-radius:var(--rs);font-size:.75rem;font-weight:700;cursor:pointer;border:none;min-height:44px;transition:.1s}
.sheet-actions button:active{transform:scale(.97)}
.sbtn-pri{background:var(--gp);color:#fff}.sbtn-sec{background:#f0f0f0;color:var(--t2)}.sbtn-warn{background:var(--ga);color:#fff}

/* cleaning */
.clean-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--rm);padding:14px;margin-bottom:8px}
.clean-card.done{opacity:.7}
.clean-chips{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.clean-chip{font-size:.53rem;padding:4px 8px;border-radius:10px;border:1.5px solid var(--bd);cursor:pointer;transition:.1s;background:var(--wh);color:var(--t2);font-weight:600}
.clean-chip.done{background:#e8f5e8;border-color:var(--gp);color:var(--gp)}
.clean-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.clean-row input{flex:1;padding:7px 10px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.62rem;font-family:inherit}
.clean-row input:focus{outline:none;border-color:var(--gp)}
.clean-actions{display:flex;gap:6px}

/* tabs */
.tabbar{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.tab{flex:1;text-align:center;padding:9px;font-size:.7rem;font-weight:700;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.12s;position:relative}
.tab.on{color:var(--gp);border-bottom-color:var(--gp)}
.tab-dot{position:absolute;top:4px;right:calc(50% - 24px);width:7px;height:7px;border-radius:50%;background:var(--rd);display:none}
.tab-dot.show{display:block}
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 22px;border-radius:20px;font-size:.72rem;font-weight:600;color:#fff;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;max-width:90%}
.toast.show{opacity:1}.toast.ok{background:var(--gp)}.toast.warn{background:var(--ga)}.toast.error{background:var(--rd)}
.log-row{display:flex;gap:8px;padding:7px 0;font-size:.6rem;border-bottom:1px dotted #f0f0f0;align-items:flex-start}
.log-icon{flex-shrink:0;width:20px;text-align:center;font-size:.7rem}
.log-body{flex:1;color:var(--t2);line-height:1.5}.log-body strong{color:var(--tx)}.log-body em{color:var(--gp);font-style:normal;font-weight:600}
.log-time{flex-shrink:0;color:var(--t3);font-size:.52rem;white-space:nowrap}
.sec-label{font-size:.65rem;font-weight:700;color:var(--t2);padding:12px 0 6px;display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:28px 16px;color:var(--t3);font-size:.65rem}.empty-icon{font-size:2rem;margin-bottom:4px;opacity:.4}
.inline-btn{padding:5px 12px;border-radius:12px;font-size:.58rem;font-weight:600;cursor:pointer;border:none;min-height:32px}
.inline-btn.pri{background:var(--gp);color:#fff}.inline-btn.sec{background:#f0f0f0;color:var(--t2)}.inline-btn.warn{background:var(--ga);color:#fff}
.bottombar{display:flex;gap:8px;padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom,0px));background:var(--bg);border-top:1px solid var(--bd);flex-shrink:0}
.btn{flex:1;padding:12px;border-radius:var(--rs);font-size:.78rem;font-weight:700;cursor:pointer;border:none;text-align:center;min-height:44px;transition:.1s}
.btn:active{transform:scale(.96)}.btn-pri{background:var(--gp);color:#fff}.btn-sec{background:var(--wh);color:var(--gp);border:1.5px solid var(--bd)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span style="font-size:1.2rem">📖</span><span class="topbar-title">大地书房 · 住宿</span><span style="font-size:.55rem;color:var(--t3)">砚仁 · 管理员</span></div>
  <div class="tabbar">
    <div class="tab on" data-tab="rooms" onclick="switchTab('rooms')">🏠 房间</div>
    <div class="tab" data-tab="cleaning" onclick="switchTab('cleaning')">🧹 打扫<span class="tab-dot" id="dotClean"></span></div>
    <div class="tab" data-tab="log" onclick="switchTab('log')">📜 日志</div>
  </div>
  <div class="body-scroll" id="bodyContent"></div>
  <div class="bottombar">
    <button class="btn btn-pri" onclick="showOccupied()">👥 当前住客</button>
    <button class="btn btn-sec" onclick="switchTab('cleaning')">🧹 打扫队列</button>
  </div>
</div>

<!-- CHECK-IN SHEET -->
<div class="sheet-overlay" id="ciSheet" onclick="if(event.target===this)closeCiSheet()">
  <div class="sheet-card">
    <div class="sheet-head"><span class="sheet-title">办理入住</span><button class="sheet-close" onclick="closeCiSheet()">✕</button></div>
    <div class="sheet-info" id="ciInfo"></div>
    <div class="sheet-row"><label>住客</label><select id="ciGuest"></select></div>
    <div class="sheet-row"><label>入住</label><input type="date" id="ciIn" onchange="updateCi()"></div>
    <div class="sheet-row"><label>退房</label><input type="date" id="ciOut" onchange="updateCi()"></div>
    <div class="sheet-row"><label>天数</label><span class="val" id="ciDays"></span></div>
    <div class="sheet-row"><label>费用</label><span class="val" id="ciTotal"></span></div>
    <div class="sheet-row"><label>实收</label><input type="number" id="ciPaid" placeholder="实际收款（NT）"></div>
    <div class="sheet-actions"><button class="sbtn-sec" onclick="closeCiSheet()">取消</button><button class="sbtn-pri" onclick="confirmCi()">✅ 确认入住</button></div>
  </div>
</div>

<!-- CHECK-OUT SHEET -->
<div class="sheet-overlay" id="coSheet" onclick="if(event.target===this)closeCoSheet()">
  <div class="sheet-card">
    <div class="sheet-head"><span class="sheet-title">办理退房</span><button class="sheet-close" onclick="closeCoSheet()">✕</button></div>
    <div class="sheet-info" id="coInfo"></div>
    <div class="sheet-reminder"><strong>📋 退房前请确认：</strong>住客自行清理个人垃圾并带走私人物品。</div>
    <div class="sheet-check">
      <label><input type="checkbox" id="coTrash" onchange="updateCo()">🗑 个人垃圾已清理并带走</label>
      <label><input type="checkbox" id="coBelongings" onchange="updateCo()">🎒 私人物品已全部带走</label>
      <label><input type="checkbox" id="coNoDamage" checked onchange="updateCo()">✅ 房间设施无损坏</label>
    </div>
    <div class="sheet-row" id="coDmgRow" style="display:none"><label>损坏</label><input type="text" id="coDamage" placeholder="描述损坏情况"></div>
    <div class="sheet-actions"><button class="sbtn-sec" onclick="closeCoSheet()">取消</button><button class="sbtn-warn" id="coBtn" disabled onclick="confirmCo()">确认退房</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ DATA — 对齐 map_locations.accommodations ══
var U='砚仁';

var ROOMS=[
  {id:'dorm101',label:'A室·三人大通铺',type:'triple_bunk',typeLabel:'三人大通铺',ac:'无',tenant:'王五',rentNT:150,checkIn:'2026-07-15',checkOut:'2026-07-20',status:'occupied'},
  {id:'dorm102',label:'B室·四人大通铺',type:'quad_bunk',typeLabel:'四人大通铺',ac:'有',tenant:null,rentNT:120,checkIn:null,checkOut:null,status:'vacant'},
  {id:'dorm103',label:'C室·上下床+大床',type:'bunk_double',typeLabel:'上下床+大床',ac:'有',tenant:'李四',rentNT:90,checkIn:'2026-07-15',checkOut:'2026-07-18',status:'occupied'},
  {id:'dorm104',label:'D室·单间大床房',type:'single',typeLabel:'单间大床房',ac:'有',tenant:null,rentNT:100,checkIn:null,checkOut:null,status:'vacant'},
  {id:'dorm105',label:'E室·两个上下床',type:'quad_bunk2',typeLabel:'两个上下床',ac:'有',tenant:null,rentNT:80,checkIn:null,checkOut:null,status:'vacant'},
  {id:'dorm106',label:'F室·两人间上下床',type:'bunk',typeLabel:'两人间上下床',ac:'有',tenant:null,rentNT:100,checkIn:null,checkOut:null,status:'vacant'}
];

var GUESTS=['砚仁','淑惠','朝林','大飞','小云','阿楠','若雨','niya','王五','李四'];
var CLEAN=[{id:'ct1',roomId:'dorm103',roomLabel:'C室',at:'2026-07-18T14:00',status:'pending',ck:{trash:false,bedding:false,surfaces:false},doneBy:'',doneAt:''}];
var LOGS=[{tp:'checkin',room:'A室',guest:'王五',dt:'入住 7/15→7/20 · 150NT',usr:'砚仁',tm:'2026-07-15T10:00'},{tp:'checkin',room:'C室',guest:'李四',dt:'入住 7/15→7/18 · 90NT',usr:'砚仁',tm:'2026-07-15T11:00'},{tp:'checkout',room:'C室',guest:'李四',dt:'退房·生成打扫任务',usr:'砚仁',tm:'2026-07-18T14:00'}];

var _tab='rooms',_ci=null,_co=null;

// ══ HELPERS ══
function T(){return new Date().toISOString().slice(0,10)}function N(){return new Date().toISOString()}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}function DB(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000)}function sd(d,days){var dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+days);return dt.toISOString().slice(0,10)}function fmt(iso){if(!iso)return'';var d=new Date(iso);return(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
var _tt;function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},1800);}

function switchTab(t){_tab=t;document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.tab===t);});document.getElementById('bodyContent').scrollTop=0;refresh();}
function iconForType(t){return t==='triple_bunk'?'🛏🛏🛏':t==='quad_bunk'?'🛏🛏🛏🛏':t==='bunk_double'?'🛏🛏+🛏':t==='single'?'🛏':t==='quad_bunk2'?'🛏🛏🛏🛏':t==='bunk'?'🛏🛏':'🛏';}

// ══ ROOMS ══
function renderRooms(){
  var el=document.getElementById('bodyContent'),h='';
  var stat=ROOMS.filter(function(r){return r.status==='vacant';}).length+'空 / '+ROOMS.filter(function(r){return r.status==='occupied';}).length+'住 / '+ROOMS.filter(function(r){return r.status==='dirty';}).length+'待扫';
  h+='<div class="sec-label">📖 大地书房 ('+ROOMS.length+'间) <span style="font-weight:400;font-size:.58rem;color:var(--t3)">'+stat+'</span></div>';

  ROOMS.forEach(function(r){
    var isFree=r.status==='vacant',isDirty=r.status==='dirty';
    var dotCls=isFree?'free':isDirty?'dirty':'occ';
    var tagCls=isFree?'av':isDirty?'di':'oc';
    var tag=isFree?'可入住':isDirty?'待打扫':'已入住';

    h+='<div class="room-card" onclick="tapRoom(\''+r.id+'\')">';
    h+='<div class="room-head"><span class="room-icon">'+iconForType(r.type)+'</span>';
    h+='<div class="room-info"><div class="room-name">'+r.label+'</div><div class="room-type">'+r.typeLabel+' · 空调：'+r.ac+' · '+r.rentNT+' NT/天</div>';
    if(!isFree)h+='<div class="room-tenant occ">'+(isDirty?'需打扫':r.tenant+' · '+r.checkIn+'→'+r.checkOut+' · '+DB(r.checkIn,r.checkOut)+'天')+'</div>';
    h+='</div>';
    h+='<div class="room-status"><div class="room-dot '+dotCls+'"></div><span class="room-tag '+tagCls+'">'+tag+'</span></div>';
    h+='</div></div>';
  });
  el.innerHTML=h;
}

function tapRoom(rid){
  var r=ROOMS.find(function(x){return x.id===rid;});if(!r)return;
  if(r.status==='vacant') openCi(r);
  else if(r.status==='occupied') openCo(r);
  else if(r.status==='dirty'){toast('待打扫，请到打扫队列处理','warn');switchTab('cleaning');}
}

// ══ CHECK-IN ══
function openCi(r){_ci=r;document.getElementById('ciInfo').innerHTML='<strong>'+r.label+'</strong> · '+r.typeLabel+' · 空调：'+r.ac+'<br>日费：<strong>'+r.rentNT+' NT/天</strong>';document.getElementById('ciGuest').innerHTML=GUESTS.map(function(g){return'<option value="'+g+'">'+g+'</option>';}).join('');document.getElementById('ciIn').value=T();document.getElementById('ciOut').value=sd(T(),7);updateCi();document.getElementById('ciSheet').classList.add('open');}
function closeCiSheet(){document.getElementById('ciSheet').classList.remove('open');_ci=null;}
function updateCi(){if(!_ci)return;var ci=document.getElementById('ciIn').value,co=document.getElementById('ciOut').value,days=Math.max(1,DB(ci,co)),total=_ci.rentNT*days;document.getElementById('ciDays').textContent=days+'天';document.getElementById('ciTotal').textContent=total+' NT';var p=document.getElementById('ciPaid');if(!p.value||parseInt(p.value)===0)p.value=total;}
function confirmCi(){if(!_ci)return;var guest=document.getElementById('ciGuest').value;if(!guest){toast('请选住客','warn');return;}var ci=document.getElementById('ciIn').value,co=document.getElementById('ciOut').value,days=Math.max(1,DB(ci,co)),total=_ci.rentNT*days,paid=parseInt(document.getElementById('ciPaid').value)||total;_ci.tenant=guest;_ci.checkIn=ci;_ci.checkOut=co;_ci.status='occupied';LOGS.unshift({tp:'checkin',room:_ci.label,guest:guest,dt:'入住 '+ci+'→'+co+' · '+total+'NT',usr:U,tm:N()});closeCiSheet();toast(guest+' 入住 '+_ci.label,'ok');refresh();}

// ══ CHECK-OUT ══
function openCo(r){_co=r;var days=Math.max(1,DB(r.checkIn,T())),total=r.rentNT*days;document.getElementById('coInfo').innerHTML='<strong>'+r.label+'</strong><br>住客：<strong>'+r.tenant+'</strong> · '+r.checkIn+'→'+r.checkOut+'<br>已住：<strong>'+days+'天</strong> · 应收费 '+total+'NT · '+(r.status==='occupied'?'<span style=color:var(--gp)>已入住中</span>':'');document.getElementById('coTrash').checked=false;document.getElementById('coBelongings').checked=false;document.getElementById('coNoDamage').checked=true;document.getElementById('coDamage').value='';document.getElementById('coDmgRow').style.display='none';updateCo();document.getElementById('coSheet').classList.add('open');}
function closeCoSheet(){document.getElementById('coSheet').classList.remove('open');_co=null;}
function updateCo(){var t=document.getElementById('coTrash').checked,b=document.getElementById('coBelongings').checked,d=document.getElementById('coNoDamage').checked;document.getElementById('coDmgRow').style.display=d?'none':'flex';document.getElementById('coBtn').disabled=!(t&&b);}
function confirmCo(){if(!_co)return;var t=document.getElementById('coTrash').checked,b=document.getElementById('coBelongings').checked,d=document.getElementById('coNoDamage').checked,dmg=d?'':document.getElementById('coDamage').value.trim(),days=Math.max(1,DB(_co.checkIn,T()));_co.status='dirty';_co.tenant=null;_co.checkIn=null;_co.checkOut=null;CLEAN.push({id:'ct'+uid(),roomId:_co.id,roomLabel:_co.label,at:N(),status:'pending',ck:{trash:false,bedding:false,surfaces:false},doneBy:'',doneAt:''});LOGS.unshift({tp:'checkout',room:_co.label,guest:_co.tenant||'—',dt:'退房·已住'+days+'天'+(t?'·垃圾已清':'')+(dmg?'·损坏：'+dmg:'')+'·生成打扫任务',usr:U,tm:N()});closeCoSheet();toast(_co.label+' 退房完成','ok');refresh();}

// ══ CLEANING ══
function renderCleaning(){var el=document.getElementById('bodyContent'),h='',p=CLEAN.filter(function(t){return t.status==='pending';}),d=CLEAN.filter(function(t){return t.status==='done';});if(!p.length&&!d.length){h='<div class="empty"><div class="empty-icon">✨</div>暂无打扫任务</div>';}if(p.length){h+='<div class="sec-label">🟡 待打扫 ('+p.length+')</div>';p.forEach(function(t){h+=renderCTask(t);});}if(d.length){h+='<div class="sec-label">✅ 已完成</div>';d.slice(-5).reverse().forEach(function(t){h+=renderCTask(t);});}el.innerHTML=h;document.getElementById('dotClean').classList.toggle('show',p.length>0);}
function renderCTask(t){var done=t.status==='done',h='<div class="clean-card'+(done?' done':'')+'">';h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-weight:700;font-size:.73rem;color:var(--tx);flex:1">'+t.roomLabel+'</span><span style="font-size:.52rem;color:var(--t3)">'+fmt(t.at)+'</span></div>';if(!done){h+='<div class="clean-chips">';[{k:'trash',l:'🗑垃圾清理'},{k:'bedding',l:'🛏布草送洗'},{k:'surfaces',l:'🧹台面清洁'}].forEach(function(x){h+='<span class="clean-chip'+(t.ck[x.k]?' done':'')+'" onclick="toggleCk(\''+t.id+'\',\''+x.k+'\')">'+x.l+(t.ck[x.k]?' ✓':'')+'</span>';});h+='</div>';h+='<div class="clean-row"><span style="font-size:.52rem;color:var(--t3);flex-shrink:0">打扫人：</span><input id="cb_'+t.id+'" placeholder="谁在打扫？" value="'+esc(t.doneBy)+'"></div>';h+='<div class="clean-actions"><button class="inline-btn pri" onclick="confirmClean(\''+t.id+'\')">✅ 确认打扫完成</button></div>';}else{h+='<div style="font-size:.55rem;color:var(--t3)">'+t.doneBy+' · '+fmt(t.doneAt)+'</div>';}h+='</div>';return h;}
function toggleCk(tid,k){var t=CLEAN.find(function(x){return x.id===tid;});if(!t)return;t.ck[k]=!t.ck[k];renderCleaning();}
function confirmClean(tid){var t=CLEAN.find(function(x){return x.id===tid;});if(!t)return;var by=document.getElementById('cb_'+tid).value.trim()||U;if(!Object.values(t.ck).every(function(v){return v;})){toast('请先完成全部打扫项','warn');return;}t.status='done';t.doneBy=by;t.doneAt=N();var r=ROOMS.find(function(x){return x.id===t.roomId;});if(r){r.status='vacant';r.tenant=null;}LOGS.unshift({tp:'clean',room:t.roomLabel,guest:'—',dt:'打扫完成·'+by,usr:U,tm:N()});toast(t.roomLabel+' 已恢复可入住 ✓','ok');refresh();}

// ══ LOG ══
function renderLog(){var el=document.getElementById('bodyContent'),h='';LOGS.slice(0,30).forEach(function(l){var icon=l.tp==='checkin'?'🏠':l.tp==='checkout'?'🚪':l.tp==='clean'?'🧹':'📝';h+='<div class="log-row"><span class="log-icon">'+icon+'</span><div class="log-body"><strong>'+esc(l.usr)+'</strong> ';if(l.tp==='checkin')h+='<em>'+esc(l.guest)+'</em> 入住 '+esc(l.room);else h+=esc(l.room)+' '+esc(l.dt);h+='</div><span class="log-time">'+fmt(l.tm)+'</span></div>';});if(!h)h='<div class="empty"><div class="empty-icon">📜</div>暂无记录</div>';el.innerHTML=h;}
function showOccupied(){var occ=ROOMS.filter(function(r){return r.status==='occupied';});if(!occ.length){toast('暂无住客','warn');return;}alert('👥 当前住客 ('+occ.length+'人)：\n\n'+occ.map(function(r){return r.tenant+' → '+r.label+' · '+r.checkIn+'→'+r.checkOut+' · '+r.rentNT+'NT/天';}).join('\n'));}

function refresh(){if(_tab==='rooms')renderRooms();else if(_tab==='cleaning')renderCleaning();else if(_tab==='log')renderLog();}
refresh();
</script>
</body>
</html>
