<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<title>大扫除 · 南塘云村</title>
<style>
:root{--gp:#3d6b52;--ga:#c8892e;--rd:#b84c38;--tx:#1d2e24;--t2:#5a6e5c;--t3:#8a8a8a;--bg:#e8ede6;--bd:#d0d9ce;--wh:#fff;--rs:8px;--rm:12px;--rl:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:system-ui,-apple-system,'Noto Sans SC',sans-serif;height:100%;overflow:hidden;background:#1d2e24;font-size:16px;user-select:none;-webkit-user-select:none}
.app{max-width:430px;margin:0 auto;height:100%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top,0px));background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0}
.topbar-title{font-weight:700;font-size:.85rem;color:var(--tx);flex:1}
.body-scroll{flex:1;overflow-y:auto;padding:0 14px 120px;-webkit-overflow-scrolling:touch}

/* hero select style area grid */
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pick-area{padding:12px 10px;border:2px solid var(--bd);border-radius:var(--rm);cursor:pointer;text-align:center;transition:.12s;position:relative;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--wh)}
.pick-area:active{transform:scale(.96)}
.pick-area.available{cursor:pointer;border-color:var(--bd)}
.pick-area.available:hover,.pick-area.available:focus-within{border-color:var(--gp)}
.pick-area.mine{border-color:var(--gp);background:#e8f5e8;box-shadow:0 0 0 2px rgba(61,107,82,.2)}
.pick-area.taken{border-color:#e8e8e8;background:#f8f8f8;cursor:not-allowed;opacity:.75}
.pick-area.done-cleaning{border-color:var(--ga);background:#fffdf5}
.pick-area.verified{border-color:var(--gp);background:#f5faf5;opacity:.85}
.pick-icon{font-size:1.4rem;line-height:1}
.pick-name{font-size:.68rem;font-weight:700;color:var(--tx)}
.pick-sub{font-size:.5rem;color:var(--t3)}
.pick-who{font-size:.55rem;font-weight:600;margin-top:2px}
.pick-who.mine{color:var(--gp)}.pick-who.other{color:var(--rd)}
.pick-badge{position:absolute;top:6px;right:6px;font-size:.55rem;font-weight:700;padding:1px 6px;border-radius:8px}
.pick-badge.av{background:#f5f5f5;color:var(--t3)}
.pick-badge.mi{background:var(--gp);color:#fff}
.pick-badge.tk{background:#fde8e8;color:var(--rd)}
.pick-badge.dc{background:var(--ga);color:#fff}
.pick-badge.vf{background:var(--gp);color:#fff}

/* my picks summary */
.my-picks{background:var(--wh);border:2px solid var(--gp);border-radius:var(--rm);padding:12px;margin-bottom:10px}
.my-picks-empty{text-align:center;padding:8px;font-size:.58rem;color:var(--t3)}
.my-picks-title{font-size:.65rem;font-weight:700;color:var(--gp);margin-bottom:6px}
.my-picks-row{display:flex;flex-wrap:wrap;gap:4px}

/* event card */
.evt-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--rm);padding:14px;margin-bottom:8px;cursor:pointer;transition:.1s}
.evt-card:active{transform:scale(.99)}
.evt-card.active{border-left:4px solid var(--gp)}
.evt-card .evt-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.evt-card .evt-title{font-weight:700;font-size:.73rem;color:var(--tx);flex:1}
.evt-card .evt-date{font-size:.5rem;color:var(--t3)}
.evt-stats{font-size:.52rem;color:var(--t2);margin-top:4px}

/* sheet */
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet-card{width:100%;max-width:430px;background:var(--wh);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px 24px;max-height:85vh;overflow-y:auto;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sheet-title{font-size:.8rem;font-weight:700;color:var(--tx);flex:1}
.sheet-close{font-size:1.1rem;cursor:pointer;color:var(--t3);background:none;border:none;padding:4px 8px}
.sheet-section{margin-bottom:12px}
.sheet-section-title{font-size:.63rem;font-weight:700;color:var(--t2);margin-bottom:6px}
.sheet-info{background:#f8faf8;border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;font-size:.6rem;color:var(--t2);line-height:1.6}
.sheet-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.sheet-row label{font-size:.6rem;font-weight:600;color:var(--t2);flex-shrink:0;min-width:44px}
.sheet-row input,.sheet-row select{flex:1;padding:8px 10px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.7rem;font-family:inherit;background:var(--wh)}
.sheet-row input:focus,.sheet-row select:focus{outline:none;border-color:var(--gp)}
.sheet-actions{display:flex;gap:8px;margin-top:12px}
.sheet-actions button{flex:1;padding:11px;border-radius:var(--rs);font-size:.7rem;font-weight:700;cursor:pointer;border:none;min-height:44px;transition:.1s}
.sbtn-pri{background:var(--gp);color:#fff}.sbtn-sec{background:#f0f0f0;color:var(--t2)}.sbtn-warn{background:var(--ga);color:#fff}

/* verify row */
.verify-item{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:.6rem}
.verify-item .v-icon{font-size:1rem;width:22px;text-align:center}
.verify-item .v-info{flex:1;color:var(--t2)}
.verify-item .v-who{font-weight:600;color:var(--tx)}

/* tabs */
.tabbar{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.tab{flex:1;text-align:center;padding:9px;font-size:.65rem;font-weight:700;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.12s;position:relative}
.tab.on{color:var(--gp);border-bottom-color:var(--gp)}
.tab-dot{position:absolute;top:4px;right:calc(50% - 24px);width:7px;height:7px;border-radius:50%;background:var(--rd);display:none}
.tab-dot.show{display:block}

/* user switcher (for demo) */
.user-bar{display:flex;gap:4px;padding:6px 14px;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0}
.user-bar::-webkit-scrollbar{display:none}
.user-chip{flex:none;padding:4px 10px;border-radius:12px;border:1.5px solid var(--bd);font-size:.55rem;font-weight:600;color:var(--t2);cursor:pointer;background:var(--wh);transition:.1s}
.user-chip.me{border-color:var(--gp);background:var(--gp);color:#fff}

.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 22px;border-radius:20px;font-size:.72rem;font-weight:600;color:#fff;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;max-width:90%}
.toast.show{opacity:1}.toast.ok{background:var(--gp)}.toast.warn{background:var(--ga)}.toast.error{background:var(--rd)}
.sec-label{font-size:.63rem;font-weight:700;color:var(--t2);padding:8px 0 6px;display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:36px 16px;color:var(--t3);font-size:.63rem}.empty-icon{font-size:2.2rem;margin-bottom:4px;opacity:.4}
.inline-btn{padding:5px 12px;border-radius:12px;font-size:.56rem;font-weight:600;cursor:pointer;border:none;min-height:32px}
.inline-btn.pri{background:var(--gp);color:#fff}.inline-btn.sec{background:#f0f0f0;color:var(--t2)}.inline-btn.warn{background:var(--ga);color:#fff}
.bottombar{display:flex;gap:8px;padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom,0px));background:var(--bg);border-top:1px solid var(--bd);flex-shrink:0}
.btn{flex:1;padding:12px;border-radius:var(--rs);font-size:.73rem;font-weight:700;cursor:pointer;border:none;text-align:center;min-height:44px;transition:.1s}
.btn:active{transform:scale(.96)}.btn-pri{background:var(--gp);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span style="font-size:1.2rem">🧹</span><span class="topbar-title">大扫除</span><span style="font-size:.5rem;color:var(--t3)" id="topWho"></span></div>
  <!-- user switcher (demo: simulate multiple phones) -->
  <div class="user-bar" id="userBar"></div>
  <div class="tabbar">
    <div class="tab on" data-tab="active" onclick="switchTab('active')">🟢 进行中</div>
    <div class="tab" data-tab="upcoming" onclick="switchTab('upcoming')">📅 即将</div>
    <div class="tab" data-tab="verify" onclick="switchTab('verify')">⏳ 待校核<span class="tab-dot" id="dotVerify"></span></div>
    <div class="tab" data-tab="done" onclick="switchTab('done')">📁 往期</div>
  </div>
  <div class="body-scroll" id="bodyContent"></div>
  <div class="bottombar"><button class="btn btn-pri" onclick="openCreate()">＋ 发起大扫除</button></div>
</div>

<!-- CREATE SHEET -->
<div class="sheet-overlay" id="createSheet" onclick="if(event.target===this)closeCreate()">
  <div class="sheet-card">
    <div class="sheet-head"><span class="sheet-title">发起大扫除</span><button class="sheet-close" onclick="closeCreate()">✕</button></div>
    <div class="sheet-row"><label>标题</label><input type="text" id="crTitle" placeholder="如：周末例行大扫除"></div>
    <div class="sheet-row"><label>日期</label><input type="date" id="crDate"></div>
    <div class="sheet-row"><label>时间</label><select id="crTime"><option>09:00-12:00</option><option>14:00-17:00</option><option>全天</option></select></div>
    <div class="sheet-section"><div class="sheet-section-title">🏠 打扫区域（大家选）</div><div id="crAreaCheckboxes"></div></div>
    <div class="sheet-info" id="crNTInfo"></div>
    <div class="sheet-actions"><button class="sbtn-sec" onclick="closeCreate()">取消</button><button class="sbtn-pri" onclick="confirmCreate()">✅ 发布</button></div>
  </div>
</div>

<!-- EVENT VIEW (hero select) -->
<div class="sheet-overlay" id="evtSheet" onclick="if(event.target===this)closeEvtSheet()">
  <div class="sheet-card">
    <div class="sheet-head"><span class="sheet-title" id="evtTitle"></span><button class="sheet-close" onclick="closeEvtSheet()">✕</button></div>
    <div id="evtBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  DATA — 多用户视角 · 像游戏选英雄一样选区域
// ═══════════════════════════════════════════
var U='砚仁'; // current user (demo: switchable)
var ALL_USERS=['砚仁','淑惠','朝林','大飞','小云'];
var ON_SITE=['砚仁','淑惠','朝林','大飞','小云']; // 在地≥1周

var PROJECT_SPACES=[
  {id:'kitchen',name:'厨房',icon:'🍳',bld:'大地书房',rate:15},
  {id:'toilet_r',name:'卫生间',icon:'🚽',bld:'大地书房',rate:15},
  {id:'studio',name:'画室',icon:'🎨',bld:'大地书房',rate:8},
  {id:'study_r',name:'大书房',icon:'📚',bld:'大地书房',rate:5},
  {id:'reading',name:'阅览室',icon:'📖',bld:'大地书房',rate:5},
  {id:'office_r',name:'办公室',icon:'💻',bld:'大地书房',rate:5},
  {id:'storage',name:'储物间',icon:'📦',bld:'大地书房',rate:3},
  {id:'courtyard',name:'院子',icon:'🌿',bld:'户外',rate:2},
  {id:'corridor',name:'走廊',icon:'🚶',bld:'大地书房',rate:8},
  {id:'laundry',name:'洗衣房',icon:'🧺',bld:'大地书房',rate:5},
  {id:'dorm101',name:'A室',icon:'🛏',bld:'宿舍',rate:5},
  {id:'dorm104',name:'D室',icon:'🛏',bld:'宿舍',rate:5}
];

var CONFIG={cleaning_pricing:{dirty:20,warning:15,clean:5}};
function calcNT(sid){var s=PROJECT_SPACES.find(function(x){return x.id===sid;});if(!s)return 10;if(s.rate>=15)return CONFIG.cleaning_pricing.dirty;if(s.rate>=8)return CONFIG.cleaning_pricing.warning;return CONFIG.cleaning_pricing.clean;}

// events: { ..., picks: { spaceId: { by:'砚仁', status:'picked'|'cleaned'|'verified', verifiedBy:'淑惠' } } }
var EVENTS=[
  {id:'dc1',title:'周末例行大扫除',date:'2026-07-26',time:'09:00-12:00',
   spaces:['kitchen','toilet_r','studio','courtyard','corridor','storage'],
   picks:{kitchen:{by:'砚仁',status:'verified',verifiedBy:'淑惠'},toilet_r:{by:'淑惠',status:'verified',verifiedBy:'朝林'},studio:{by:'朝林',status:'cleaned'},courtyard:{by:'大飞',status:'picked'},corridor:{by:'小云',status:'picked'},storage:{by:'',status:'open'}},
   createdBy:'砚仁',createdAt:'2026-07-20T14:00',status:'active'},
  {id:'dc2',title:'迎接新营员大扫除',date:'2026-07-28',time:'14:00-17:00',
   spaces:['kitchen','toilet_r','studio','courtyard','corridor','laundry','dorm101'],
   picks:{},
   createdBy:'砚仁',createdAt:'2026-07-21T09:00',status:'upcoming'},
  {id:'dc3',title:'节前大扫除',date:'2026-07-14',time:'全天',
   spaces:['kitchen','toilet_r','studio','courtyard','storage'],
   picks:{kitchen:{by:'砚仁',status:'verified',verifiedBy:'淑惠'},toilet_r:{by:'淑惠',status:'verified',verifiedBy:'砚仁'},studio:{by:'朝林',status:'verified',verifiedBy:'大飞'},courtyard:{by:'大飞',status:'verified',verifiedBy:'小云'},storage:{by:'小云',status:'verified',verifiedBy:'砚仁'}},
   createdBy:'砚仁',createdAt:'2026-07-10T10:00',status:'completed',completedAt:'2026-07-14T17:00'}
];

var _tab='active',_evt=null,_crSpaces=[];

// ══ HELPERS ══
function T(){return new Date().toISOString().slice(0,10)}function N(){return new Date().toISOString()}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},1800);}
function sid(id){var s=PROJECT_SPACES.find(function(x){return x.id===id;});return s||{name:id,icon:'📍',bld:'',rate:5};}

// ══ USER SWITCHER (demo) ══
function renderUserBar(){
  var h='';
  ALL_USERS.forEach(function(u){h+='<span class="user-chip'+(u===U?' me':'')+'" onclick="switchUser(\''+u+'\')">'+u+'</span>';});
  document.getElementById('userBar').innerHTML=h;
  document.getElementById('topWho').textContent='👤 '+U;
}

function switchUser(u){U=u;renderUserBar();refresh();}

// ══ TABS ══
function switchTab(t){_tab=t;document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.tab===t);});refresh();}

// ══ EVENT LIST ══
function renderList(){
  var el=document.getElementById('bodyContent');
  var pendingVerify=0;
  EVENTS.filter(function(e){return e.status==='active';}).forEach(function(e){
    (e.spaces||[]).forEach(function(sid){var p=e.picks[sid]||{};if(p.status==='cleaned')pendingVerify++;});
  });
  document.getElementById('dotVerify').classList.toggle('show',pendingVerify>0);

  if(_tab==='verify'){
    var h='<div class="sec-label">⏳ 待校核 ('+pendingVerify+'项) · 任何人可校核（不能校核自己）</div>';
    EVENTS.filter(function(e){return e.status==='active';}).forEach(function(e){
      (e.spaces||[]).forEach(function(sid){var p=e.picks[sid]||{};if(p.status!=='cleaned')return;var s=sid(sid);
      h+='<div class="verify-item"><span class="v-icon">'+s.icon+'</span><div class="v-info"><span class="v-who">'+s.name+'</span> · '+e.title+' · 打扫人：'+p.by+' · +'+calcNT(sid)+' NT</div>';
      if(p.by!==U)h+='<button class="inline-btn pri" onclick="doVerify(\''+e.id+'\',\''+sid+'\')">✅ 校核</button>';
      else h+='<span style="font-size:.5rem;color:var(--t3)">⚠ 自己</span>';
      h+='</div>';});
    });
    if(!pendingVerify)h+='<div class="empty"><div class="empty-icon">✅</div>暂无待校核项</div>';
    el.innerHTML=h;return;
  }

  var list=EVENTS.filter(function(e){return _tab==='active'?e.status==='active':_tab==='upcoming'?e.status==='upcoming':e.status==='completed';});
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">'+( _tab==='done'?'📁':'📅')+'</div>'+( _tab==='done'?'暂无往期':'暂无大扫除')+'</div>';return;}

  var h='';
  list.forEach(function(e){
    var picks=Object.values(e.picks||{}),picked=picks.filter(function(p){return p.by;}).length,verified=picks.filter(function(p){return p.status==='verified';}).length;
    var myPicks=0;Object.values(e.picks||{}).forEach(function(p){if(p.by===U)myPicks++;});
    h+='<div class="evt-card '+e.status+'" onclick="openEvent(\''+e.id+'\')"><div class="evt-head"><span class="evt-icon">🧹</span><span class="evt-title">'+esc(e.title)+'</span><span class="evt-date">'+e.date+'</span></div><div class="evt-stats">'+(e.spaces||[]).length+'个区域 · '+picked+'人选走 · '+verified+'已校核 · 我选了 '+myPicks+'个</div></div>';
  });
  el.innerHTML=h;
}

// ═══ HERO SELECT VIEW ═══
function openEvent(eid){
  var e=EVENTS.find(function(x){return x.id===eid;});if(!e)return;_evt=e;
  document.getElementById('evtTitle').textContent=e.title;
  renderEventView();
  document.getElementById('evtSheet').classList.add('open');
}
function closeEvtSheet(){document.getElementById('evtSheet').classList.remove('open');_evt=null;refresh();}

function renderEventView(){
  var e=_evt,el=document.getElementById('evtBody'),h='';
  var myPicks=[];Object.entries(e.picks||{}).forEach(function(x){if(x[1].by===U)myPicks.push(x[0]);});
  var isActive=e.status==='active',isDone=e.status==='completed';
  var allSpacesPicked=(e.spaces||[]).every(function(sid){return(e.picks[sid]||{}).by;});
  var allVerified=(e.spaces||[]).every(function(sid){return(e.picks[sid]||{}).status==='verified';});

  h+='<div class="sheet-info"><strong>'+e.date+'</strong> · '+e.time+' · 发起人：'+e.createdBy+'<br>在地居民必须参加：<strong>'+ON_SITE.join('、')+'</strong><br>NT按公约：重度'+CONFIG.cleaning_pricing.dirty+'NT · 中度'+CONFIG.cleaning_pricing.warning+'NT · 轻度'+CONFIG.cleaning_pricing.clean+'NT</div>';

  // My picks
  h+='<div class="sheet-section"><div class="sheet-section-title">🙋 我（'+U+'）选的区域</div>';
  if(myPicks.length){
    h+='<div class="my-picks"><div class="my-picks-row">';
    myPicks.forEach(function(sid){var s=sid(sid),p=e.picks[sid]||{};h+='<span class="tag '+(p.status==='verified'?'g':p.status==='cleaned'?'y':'g')+'">'+s.icon+' '+s.name+(p.status==='verified'?' ✓':'')+'</span>';});
    h+='</div></div>';
    // Action buttons for my picks
    var toClean=myPicks.filter(function(sid){return(e.picks[sid]||{}).status==='picked';});
    if(toClean.length&&isActive){
      h+='<button class="inline-btn pri" onclick="markCleaned(\''+e.id+'\')" style="margin-top:6px">📸 我打扫完了（'+toClean.length+'个区域）·提交校核</button>';
    }
    var waitingVerify=myPicks.filter(function(sid){return(e.picks[sid]||{}).status==='cleaned';});
    if(waitingVerify.length){
      h+='<div style="font-size:.55rem;color:var(--ga);margin-top:6px">⏳ '+waitingVerify.length+'个区域等待他人校核…</div>';
    }
  }else{
    h+='<div class="my-picks"><div class="my-picks-empty">还没选区域 — 从下方选一个 👇</div></div>';
    if(!ON_SITE.includes(U)){h+='<div style="font-size:.55rem;color:var(--rd)">⚠ 你不在"在地居民"名单中</div>';}
  }
  h+='</div>';

  // Area grid — game lobby style
  h+='<div class="sheet-section"><div class="sheet-section-title">🗺️ 选择打扫区域 '+(isActive?'('+(e.spaces||[]).length+'个)':'')+'</div>';
  h+='<div class="pick-grid">';
  (e.spaces||[]).forEach(function(sid){
    var s=sid(sid),p=e.picks[sid]||{},nt=calcNT(sid);
    var isMine=p.by===U,isTaken=!!p.by&&!isMine,isCleaned=p.status==='cleaned',isVerified=p.status==='verified';
    var cls='',badge='',who='';

    if(isVerified){cls='verified';badge='<span class="pick-badge vf">✓已校核</span>';who=p.by;}
    else if(isCleaned){cls=isMine?'done-cleaning':'done-cleaning';badge=isMine?'<span class="pick-badge dc">待校核</span>':'<span class="pick-badge tk">'+p.by+'打扫</span>';who=p.by;}
    else if(isMine){cls='mine';badge='<span class="pick-badge mi">我选的</span>';who='我';}
    else if(isTaken){cls='taken';badge='<span class="pick-badge tk">'+p.by+'</span>';who=p.by;}
    else{cls='available';badge='<span class="pick-badge av">可选</span>';}

    var onclick='';
    if(isActive&&!isTaken&&!isMine){onclick='onclick="pickArea(\''+e.id+'\',\''+sid+'\')"';}
    else if(isActive&&isMine&&!isCleaned){onclick='onclick="unpickArea(\''+e.id+'\',\''+sid+'\')"';}

    h+='<div class="pick-area '+cls+'" '+onclick+' title="'+s.name+' · '+s.bld+' · '+nt+'NT">';
    h+=badge+'<span class="pick-icon">'+s.icon+'</span><span class="pick-name">'+s.name+'</span><span class="pick-sub">'+s.bld+' · '+nt+'NT</span>';
    if(who)h+='<span class="pick-who '+(isMine?'mine':'other')+'">'+who+'</span>';
    h+='</div>';
  });
  h+='</div></div>';

  // All done / admin close
  if(allVerified&&isActive){
    h+='<div class="sheet-actions"><button class="sbtn-warn" onclick="completeEvent(\''+e.id+'\')">✅ 全部校核通过 · 结束大扫除</button></div>';
  }

  el.innerHTML=h;
}

// ══ GAME ACTIONS ══
function pickArea(eid,sid){
  var e=EVENTS.find(function(x){return x.id===eid;});if(!e)return;
  if(e.status!=='active'){toast('活动未开始','warn');return;}
  if(!ON_SITE.includes(U)){toast('只有在地居民可以选','warn');return;}
  e.picks=e.picks||{};
  if(e.picks[sid]&&e.picks[sid].by){toast('已被 '+e.picks[sid].by+' 选了','warn');return;}
  e.picks[sid]={by:U,status:'picked'};
  toast('已选 '+sid(sid).name+' ✓','ok');renderEventView();
}

function unpickArea(eid,sid){
  var e=EVENTS.find(function(x){return x.id===eid;});if(!e)return;
  e.picks=e.picks||{};
  var p=e.picks[sid];if(!p||p.by!==U)return;
  if(p.status!=='picked'){toast('已经开始打扫了，不能撤销','warn');return;}
  e.picks[sid]={by:'',status:'open'};
  toast('已取消 '+sid(sid).name,'warn');renderEventView();
}

function markCleaned(eid){
  var e=EVENTS.find(function(x){return x.id===eid;});if(!e)return;
  e.picks=e.picks||{};
  var count=0;
  (e.spaces||[]).forEach(function(sid){var p=e.picks[sid]||{};if(p.by===U&&p.status==='picked'){e.picks[sid].status='cleaned';count++;}});
  if(!count){toast('没有待提交的区域','warn');return;}
  toast(count+'个区域已提交·等待校核 ⏳','ok');renderEventView();
}

function doVerify(eid,sid){
  var e=EVENTS.find(function(x){return x.id===eid;});if(!e)return;
  var p=e.picks[sid];if(!p||p.status!=='cleaned')return;
  if(p.by===U){toast('不能校核自己','warn');return;}
  p.status='verified';p.verifiedBy=U;
  toast('已校核 '+sid(sid).name+' ✓ +'+calcNT(sid)+' NT 给 '+p.by,'ok');
  if(_tab==='verify')refresh();else renderEventView();
}

function completeEvent(eid){
  var e=EVENTS.find(function(x){return x.id===eid;});if(!e)return;
  var allVerified=(e.spaces||[]).every(function(sid){return(e.picks[sid]||{}).status==='verified';});
  if(!allVerified){toast('还有区域未校核','warn');return;}
  e.status='completed';e.completedAt=N();
  var totalNT=0;(e.spaces||[]).forEach(function(sid){totalNT+=calcNT(sid);});
  toast('大扫除完成！共发放 '+totalNT+' NT 🎉','ok');closeEvtSheet();refresh();
}

// ══ CREATE ══
function openCreate(){
  document.getElementById('crTitle').value='';document.getElementById('crDate').value=T();
  document.getElementById('crTime').value='09:00-12:00';
  _crSpaces=PROJECT_SPACES.map(function(s){return s.id;});
  var ah='';PROJECT_SPACES.forEach(function(s){ah+='<label class="area-item" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 0;font-size:.6rem"><input type="checkbox" checked onchange="toggleCrSpace(\''+s.id+'\')" style="accent-color:var(--gp)">'+s.icon+' '+s.name+' <span style="color:var(--t3);font-size:.5rem">('+s.bld+')</span></label>';});
  document.getElementById('crAreaCheckboxes').innerHTML=ah;
  document.getElementById('crNTInfo').innerHTML='<strong>NT（按公约自动）：</strong>重度(卫/厨) '+CONFIG.cleaning_pricing.dirty+'NT · 中度(画/廊) '+CONFIG.cleaning_pricing.warning+'NT · 轻度(室/储) '+CONFIG.cleaning_pricing.clean+'NT<br>在地居民必须参加：<strong>'+ON_SITE.join('、')+'</strong>（≥1周）';
  document.getElementById('createSheet').classList.add('open');
}
function closeCreate(){document.getElementById('createSheet').classList.remove('open');}
function toggleCrSpace(sid){var i=_crSpaces.indexOf(sid);if(i>=0)_crSpaces.splice(i,1);else _crSpaces.push(sid);}
function confirmCreate(){
  var title=document.getElementById('crTitle').value.trim();if(!title){toast('请输入标题','warn');return;}
  var date=document.getElementById('crDate').value,time=document.getElementById('crTime').value;
  if(_crSpaces.length===0){toast('至少选一个区域','warn');return;}
  var picks={};_crSpaces.forEach(function(sid){picks[sid]={by:'',status:'open'};});
  EVENTS.unshift({id:'dc'+uid(),title:title,date:date,time:time,spaces:_crSpaces.slice(),picks:picks,createdBy:U,createdAt:N(),status:'upcoming'});
  _crSpaces=[];closeCreate();toast('大扫除已发布！到时间大家来选区域 📢','ok');refresh();
}

function refresh(){renderList();}
renderUserBar();refresh();
</script>
